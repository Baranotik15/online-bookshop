<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BookShop{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --navy: #1b3a5c;
            --navy-dark: #122840;
            --gold: #e8a020;
            --gold-hover: #d4911a;
            --bg: #f4f3ef;
            --card-bg: #ffffff;
            --text: #2d2d2d;
            --muted: #6b7280;
            --border: #e2e0d8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ─── Header ─── */
        header {
            background: var(--navy);
            color: #fff;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,.25);
        }

        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            letter-spacing: .5px;
            white-space: nowrap;
        }
        .logo span { color: var(--gold); }

        nav { display: flex; gap: 4px; flex: 1; }

        nav a {
            color: rgba(255,255,255,.85);
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: .9rem;
            font-weight: 500;
            transition: background .15s, color .15s;
        }
        nav a:hover, nav a.active {
            background: rgba(255,255,255,.12);
            color: #fff;
        }

        .header-actions { margin-left: auto; display: flex; gap: 10px; align-items: center; }

        .btn-outline {
            border: 1.5px solid rgba(255,255,255,.5);
            color: #fff;
            background: transparent;
            padding: 7px 16px;
            border-radius: 6px;
            font-size: .85rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: background .15s, border-color .15s;
        }
        .btn-outline:hover { background: rgba(255,255,255,.12); border-color: #fff; }

        /* ─── Main ─── */
        main { flex: 1; max-width: 1200px; width: 100%; margin: 0 auto; padding: 36px 24px; }

        /* ─── Page heading ─── */
        .page-heading {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 28px;
        }
        .page-heading h1 { font-size: 1.7rem; font-weight: 700; color: var(--navy); }
        .page-heading .count { font-size: .9rem; color: var(--muted); }

        /* ─── Book grid ─── */
        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 24px;
        }

        .book-card {
            background: var(--card-bg);
            border-radius: 10px;
            border: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform .18s, box-shadow .18s;
        }
        .book-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,.1); }

        .book-cover {
            aspect-ratio: 2/3;
            background: linear-gradient(135deg, #dde3ec 0%, #c8d0de 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .book-cover img { width: 100%; height: 100%; object-fit: cover; }
        .book-cover .no-cover {
            font-size: 3rem;
            opacity: .35;
            user-select: none;
        }

        .book-info { padding: 14px; display: flex; flex-direction: column; gap: 6px; flex: 1; }
        .book-title {
            font-size: .95rem;
            font-weight: 600;
            color: var(--navy);
            line-height: 1.35;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .book-author { font-size: .8rem; color: var(--muted); }
        .book-price { font-size: 1.05rem; font-weight: 700; color: var(--navy); margin-top: auto; padding-top: 8px; }

        .btn-primary {
            background: var(--gold);
            color: #fff;
            border: none;
            padding: 9px 0;
            border-radius: 0 0 10px 10px;
            font-size: .85rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: block;
            transition: background .15s;
        }
        .btn-primary:hover { background: var(--gold-hover); }

        /* ─── Detail page ─── */
        .detail-grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 48px;
            align-items: start;
        }

        .detail-cover {
            background: linear-gradient(135deg, #dde3ec 0%, #c8d0de 100%);
            border-radius: 10px;
            aspect-ratio: 2/3;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,.12);
        }
        .detail-cover img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
        .detail-cover .no-cover { font-size: 5rem; opacity: .3; }

        .detail-info { display: flex; flex-direction: column; gap: 16px; }
        .detail-info h1 { font-size: 1.9rem; font-weight: 700; color: var(--navy); line-height: 1.25; }
        .detail-author { font-size: 1rem; color: var(--muted); }
        .detail-author a { color: var(--navy); text-decoration: none; font-weight: 500; }
        .detail-author a:hover { text-decoration: underline; }

        .detail-price { font-size: 2rem; font-weight: 700; color: var(--navy); }

        .stock-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: .82rem;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 20px;
        }
        .stock-badge.in-stock { background: #dcfce7; color: #166534; }
        .stock-badge.out-of-stock { background: #fee2e2; color: #991b1b; }

        .detail-description {
            font-size: .95rem;
            line-height: 1.7;
            color: #444;
            border-top: 1px solid var(--border);
            padding-top: 16px;
        }

        .btn-buy {
            background: var(--gold);
            color: #fff;
            border: none;
            padding: 14px 36px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background .15s;
            align-self: flex-start;
        }
        .btn-buy:hover { background: var(--gold-hover); }

        /* ─── Breadcrumb ─── */
        .breadcrumb {
            display: flex;
            gap: 8px;
            align-items: center;
            font-size: .85rem;
            color: var(--muted);
            margin-bottom: 24px;
        }
        .breadcrumb a { color: var(--navy); text-decoration: none; }
        .breadcrumb a:hover { text-decoration: underline; }
        .breadcrumb .sep { color: var(--border); }

        /* ─── Footer ─── */
        footer {
            background: var(--navy-dark);
            color: rgba(255,255,255,.5);
            text-align: center;
            padding: 20px 24px;
            font-size: .82rem;
            margin-top: 48px;
        }

        @media (max-width: 640px) {
            .detail-grid { grid-template-columns: 1fr; }
            .detail-cover { max-width: 220px; }
            nav a { padding: 8px 10px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <a href="/" class="logo">Book<span>Shop</span></a>
        <nav>
            <a href="/" {% if request.path == '/' %}class="active"{% endif %}>Головна</a>
            <a href="/api/books/" target="_blank">API</a>
        </nav>
        <div class="header-actions">
            <a href="/admin/" class="btn-outline">Адмін</a>
        </div>
    </div>
</header>

<main>
    {% block content %}{% endblock %}
</main>

<footer>
    &copy; 2025 BookShop. Всі права захищені.
</footer>

</body>
</html>
